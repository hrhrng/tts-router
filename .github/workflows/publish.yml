name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Stamp skill version
        run: |
          VERSION=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          sed -i "s/^cli_version: .*/cli_version: $VERSION/" skills/tts-router/SKILL.md
          sed -i "s/CLI >= \*\*[0-9.]*\*\*/CLI >= **$VERSION**/" skills/tts-router/SKILL.md

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed — uses OIDC trusted publishing
